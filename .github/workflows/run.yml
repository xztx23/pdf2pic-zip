name: PDF 转图片并打包 ZIP
on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: "PDF 文件下载地址"
        required: true
      student_id:
        description: "学号（作为唯一ID）"
        required: true

# 关键修复：显式授予所有必要权限
permissions:
  contents: write  # 允许创建 Release 和 Tag
  actions: read

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -y
          pip install -r requirements.txt

      - name: 下载 PDF
        run: wget -O "input_${{ inputs.student_id }}.pdf" "${{ inputs.pdf_url }}"

      - name: 执行转换
        run: python3 convert.py "${{ inputs.student_id }}"

      - name: 创建 Release 并上传 ZIP
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "student-${{ inputs.student_id }}"
          files: "result_${{ inputs.student_id }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
